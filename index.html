        "erörtern unter Bezugnahme auf die Rationalismus und Empirismus verbindende erkenntnistheoretische Position argumentativ abwägend die Frage nach der Begründung des Anspruchs von (naturwissenschaftlicher) Erkenntnis auf Allgemeingültigkeit sowie das Problem der Berechtigung dieses Anspruchs."
       ],
       "handlung": [
        "beteiligen sich mit fundierten philosophischen Beiträgen an der Diskussion allgemein - menschlicher und gegenwärtiger gesellschaftlich-politischer Fragestellungen (HK4)."
       ],
       "inhaltsfelder": [
        4,
        5,
        6
       ],
       "schwerpunkte": [
        "Der Anspruch der Naturwissenschaften auf Objektivität",
        "Verantwortung in ethischen Anwendungskontexten",
        "Konzepte von Demokratie (und sozialer Gerechtigkeit)"
       ],
       "zeit": 14,
       "nr": "XX"
      },
      {
       "thema": "Was ist das Besondere geisteswissenschaftlicher Erkenntnis? – Anspruch und Verfahren der Geisteswissenschaften",
       "sach": [
        "stellen Unterschiede der Erkenntnisverfahren in den Natur-und Geisteswissenschaften dar und erläutern sie an Beispielen",
        "rekonstruieren ein philosophisches Denkmodell zur Bestimmung der spezifischen Erkenntnismethoden der Geisteswissenschaften (Hermeneutik) in Abgrenzung von den Naturwissenschaften in seinem gedanklichen Aufbau."
       ],
       "methoden": [
        "beschreiben Phänomene der Lebenswelt vorurteilsfrei und sprachlich genau in bewusster Abgrenzung von wissenschaftlichen Klassifizierungen (MK1)",
        "analysieren den Argumentationsaufbau und die Argumentationsstruktur in komplexeren philosophischen Texten und interpretieren wesentliche Aussagen (MK5)",
        "bestimmen philosophische Begriffe mit Hi lfe verschiedener definitorischer Verfahren und grenzen sie voneinander ab (MK7).",
        "stellen in einer differenzierten Argumentation (u. a. philosophische Disputation, philosophischer Essay) abwägend komplexere philosophische Probleme und Problemlösungsbeiträge dar (MK13)."
       ],
       "urteil": [
        "erörtern abwägend erkenntnistheoretische Voraussetzungen des behandelten hermeneutischen Modells und dessen K onsequenzen für das Vorgehen in den Geisteswissenschaften",
        "erörtern argumentativ abwägend die Frage nach der Reichweite und dem Wahrheitsanspruch naturwissenschaftlicher und geisteswissenschaftlichen Erkenntnis sowie das Problem, welche Erkenntnisform das Selbstverständnis des Menschen in der Zukunft prägen soll."
       ],
       "handlung": [
        "vertreten im Rahmen rationaler Diskurse im Unterricht ihre eigene Position und gehen argumentativ und klärend auch auf andere Positionen ein (HK3)."
       ],
       "inhaltsfelder": [
        3,
        5,
        6
       ],
       "schwerpunkte": [
        "Erkenntnis in den Geisteswissenschaften",
        "Der Mensch als Natur-und Kulturwesen",
        "Konzepte von Demokratie (und sozialer Gerechtigkeit)"
       ],
       "zeit": 12,
       "nr": "XXI"
      }
     ],
     "summe": 100
    }
   }

 }
}</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById("philo-daten").textContent);

const STUFEN = ["EF","Q1","Q2"];
const TILE = {"EF":"var(--if2)","Q1":"var(--if3)","Q2":"var(--if5)"};
const SUB = {"EF":"Einführungsphase","Q1":"Qualifikationsphase","Q2":"Abiturjahr"};
const LABEL = {"EF":"Einführungsphase (EF)","Q1":"Qualifikationsphase 1 (Q1)","Q2":"Qualifikationsphase 2 (Q2)"};

const INTROS = {
  "EF":"Was heißt Philosophieren? Die Einführungsphase behandelt Welterklärung, Menschenbild, Handeln und die Frage, was wir wissen können.",
  "Q1":"Anthropologie und Ethik: das Selbstverständnis des Menschen, Freiheit, Kultur, Leib und Seele, dazu ethische Grundpositionen. Die Inhalte unterscheiden sich nach Kursart.",
  "Q2":"Staatsphilosophie und Wissenschaftstheorie: Legitimation staatlicher Ordnung, Grundsätze eines gelingenden Lebens, Geltungsansprüche der Wissenschaften."
};

const ROMAN_LIST = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML;}
/* MK/HK-Verweise für die Lese-Ansicht entfernen */
function lesbar(t){
  return t.replace(/\s*\((?:MK|HK)\d+[^)]*\)\s*/g," ").replace(/\s{2,}/g," ").trim().replace(/[,.]$/,"");
}

/* ---------- Legende ---------- */
const legend = document.getElementById("legend");
Object.entries(DATA.ifNamen).forEach(([n,name])=>{
  const s=document.createElement("span");
  s.innerHTML=`<i style="background:var(--if${n})"></i>${esc(name)}`;
  legend.appendChild(s);
});

/* ---------- Stufen-Buttons ---------- */
const stufenEl = document.getElementById("stufen");
STUFEN.forEach(st=>{
  const b=document.createElement("button");
  b.className="stufe-btn"; b.type="button";
  b.style.setProperty("--tile",TILE[st]);
  b.setAttribute("aria-pressed","false");
  b.dataset.stufe=st;
  b.innerHTML=`<span class="num">${st}</span><span class="sub">${SUB[st]}</span><span class="dot"></span>`;
  b.addEventListener("click",()=>select(st,null,true));
  stufenEl.appendChild(b);
});

/* ---------- Stufenansicht ---------- */
const view = document.getElementById("view");
let currentStufe=null, currentKurs="GK";

function stufenDaten(){
  const d=DATA.stufen[currentStufe];
  return d.kurs ? d.kurs[currentKurs] : d;
}

function select(stufe, kurs, push){
  currentStufe=stufe;
  if(DATA.stufen[stufe].kurs){ currentKurs = kurs || currentKurs || "GK"; }
  document.querySelectorAll(".stufe-btn").forEach(b=>
    b.setAttribute("aria-pressed", b.dataset.stufe===stufe ? "true":"false"));
  render();
  if(push){
    const h = DATA.stufen[stufe].kurs ? `#${stufe.toLowerCase()}-${currentKurs.toLowerCase()}` : `#${stufe.toLowerCase()}`;
    history.replaceState(null,"",h);
    view.scrollIntoView({behavior: matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto":"smooth", block:"start"});
  }
}

function render(){
  const d=DATA.stufen[currentStufe];
  const sd=stufenDaten();
  const uvs=sd.uvs;
  const idx = STUFEN.indexOf(currentStufe);

  let head=`<div class="view-head"><h2>${esc(LABEL[currentStufe])}</h2>`;
  if(d.kurs){
    head+=`<div class="kurs-toggle" role="group" aria-label="Kursart wählen">
      <button type="button" aria-pressed="${currentKurs==="GK"}" data-kurs="GK">Grundkurs</button>
      <button type="button" aria-pressed="${currentKurs==="LK"}" data-kurs="LK">Leistungskurs</button></div>`;
  }
  if(sd.summe){ head+=`<span class="summe">${sd.summe} Unterrichtsstunden</span>`; }
  head+=`</div>`;

  const pfad=`<div class="pfad" aria-hidden="true">${STUFEN.map((s,i)=>
    `<i class="${i<=idx?"on":""}" style="--tile:${TILE[currentStufe]}"></i>`).join("")}</div>`;

  const intro=`<p class="intro">${esc(INTROS[currentStufe]||"")}</p>`;

  const list = uvs.map((uv,i)=>{
    const feld = uv.inhaltsfelder[0] || 1;
    const feldNamen = uv.inhaltsfelder.map(n=>DATA.ifNamen[n]).join(" · ");
    const zeit = uv.zeit ? ` · ${uv.zeit} Std.` : "";
    const seqChips = uv.schwerpunkte.map(s=>`<span>${esc(s)}</span>`).join("");
    const lernItems = uv.sach.map(k=>`<li>${esc(lesbar(k))}</li>`).join("");
    const urteilItems = uv.urteil.map(k=>`<li>${esc(lesbar(k))}</li>`).join("");
    const origM = uv.methoden.map(k=>`<li>${esc(k)}</li>`).join("");
    const origH = uv.handlung.map(k=>`<li>${esc(k)}</li>`).join("");
    return `<article class="uv" data-open="false" style="--feld:var(--if${feld});--feld-soft:var(--if${feld}-soft)">
      <button class="uv-head" type="button" aria-expanded="false">
        <span class="uv-num">${uv.nr||ROMAN_LIST[i]}</span>
        <span class="uv-titel"><span class="t">${esc(uv.thema)}</span><span class="f">${esc(feldNamen)}${zeit}</span></span>
        <svg class="uv-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="uv-body"><div class="uv-body-inner"><div class="uv-content">
        ${seqChips?`<div><h4>Darum geht es im Unterricht</h4><div class="chips">${seqChips}</div></div>`:""}
        ${lernItems?`<div><h4>Das lernen die Schüler*innen</h4><ul class="lernen">${lernItems}</ul></div>`:""}
        ${urteilItems?`<div><h4>Beurteilen und bewerten</h4><ul class="lernen urteil">${urteilItems}</ul></div>`:""}
        <details class="original">
          <summary>Lehrplan im Original ansehen</summary>
          <div class="orig-inner">
            ${origM?`<div><h5>Methodenkompetenz</h5><ul>${origM}</ul></div>`:""}
            ${origH?`<div><h5>Handlungskompetenz</h5><ul>${origH}</ul></div>`:""}
            <div><h5>Inhaltsfelder</h5><ul>${uv.inhaltsfelder.map(n=>`<li>IF ${n} (${esc(DATA.ifNamen[n])})</li>`).join("")}</ul></div>
          </div>
        </details>
      </div></div></div>
    </article>`;
  }).join("");

  view.innerHTML = head + pfad + intro + `<div class="uv-list">${list}</div>`;

  view.querySelectorAll(".kurs-toggle button").forEach(b=>
    b.addEventListener("click",()=>select(currentStufe,b.dataset.kurs,true)));
  view.querySelectorAll(".uv-head").forEach(btn=>
    btn.addEventListener("click",()=>{
      const uv=btn.closest(".uv");
      const open=uv.dataset.open==="true";
      uv.dataset.open=String(!open);
      btn.setAttribute("aria-expanded",String(!open));
    }));
}

/* ---------- Intro-Film: nach einem Durchlauf durch Standbild ersetzen ---------- */
(function(){
  const v=document.getElementById("introFilm");
  if(!v) return;
  function standbild(){
    const img=document.createElement("img");
    img.src="pkg-intro-philo-ende.jpg";
    img.alt="Schulinternes Curriculum Philosophie, Paul-Klee-Gymnasium Overath";
    img.className="intro-film";
    img.width=1280; img.height=720;
    v.replaceWith(img);
  }
  if(matchMedia("(prefers-reduced-motion: reduce)").matches){
    standbild();
    return;
  }
  v.addEventListener("ended", standbild);
  v.play?.().catch(standbild);
})();

/* ---------- Deep-Link ---------- */
(function init(){
  const h=(location.hash||"").replace("#","").toLowerCase();
  let st="EF", kurs=null;
  for(const s of STUFEN){
    if(h===s.toLowerCase()){st=s;break;}
    if(h===s.toLowerCase()+"-gk"){st=s;kurs="GK";break;}
    if(h===s.toLowerCase()+"-lk"){st=s;kurs="LK";break;}
  }
  select(st,kurs,false);
})();
</script>
</body>
</html>
